<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRODUCE – Research Project</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple: #7c3aed;
      --purple-light: #ede9fe;
      --dark: #1e1b4b;
      --mid: #4c4a7a;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f9f8ff;
      --white: #ffffff;
      --radius: 16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--dark);
      line-height: 1.65;
    }

    .top-strip {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0.4rem 2rem;
      display: flex;
      justify-content: flex-end;
      gap: 0.4rem;
    }

    .lang-btn {
      background: none;
      border: none;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      letter-spacing: 0.05em;
    }

    .lang-btn.active,
    .lang-btn:hover {
      color: var(--purple);
      background: var(--purple-light);
    }

    header {
      background: var(--white);
      border-bottom: 2px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
    }

    header img.logo {
      max-height: 90px;
      margin-bottom: 0.8rem;
    }

    .subtitle {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
    }

    .nav-btn {
      background: none;
      border: none;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--mid);
      padding: 1rem 1.2rem;
      cursor: pointer;
      letter-spacing: 0.06em;
    }

    .nav-btn.active,
    .nav-btn:hover {
      color: var(--purple);
      border-bottom: 3px solid var(--purple);
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem 2rem;
    }

    .section { display: none; }
    .section.active { display: block; }

    h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      border-left: 4px solid var(--purple);
      padding-left: 1rem;
      margin-bottom: 1.8rem;
    }

    /* ✅ unified subsection style */
    .card h3 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.7rem;
    }

    .card, .item-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .item-card h4 {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--purple);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>

<body>

<div class="top-strip">
  <button class="lang-btn active" onclick="setLang('en')">EN</button>
  <button class="lang-btn" onclick="setLang('ca')">CA</button>
  <button class="lang-btn" onclick="setLang('es')">ES</button>
</div>

<header>
  <img class="logo" src="https://lgbtiqproduce.wordpress.com/wp-content/uploads/2026/04/produceeee-1.jpg">
  <p class="subtitle" id="subtitle-text"></p>
</header>

<nav>
  <div class="nav-inner">
    <button class="nav-btn active" onclick="showSection('home')" id="nav-home"></button>
    <button class="nav-btn" onclick="showSection('team')" id="nav-team"></button>
    <button class="nav-btn" onclick="showSection('publications')" id="nav-publications"></button>
    <button class="nav-btn" onclick="showSection('thesis')" id="nav-thesis"></button>
    <button class="nav-btn" onclick="showSection('events')" id="nav-events"></button>
    <button class="nav-btn" onclick="showSection('press')" id="nav-press"></button>
    <button class="nav-btn" onclick="showSection('contact')" id="nav-contact"></button>
  </div>
</nav>

<main>

<section id="home" class="section active">
  <h2 id="home-heading"></h2>

  <div class="card">
    <h3 id="what-title">WHAT IS PRODUCE?</h3>
    <p id="what-text"></p>
  </div>

  <div class="card">
    <h3 id="whatdo-title">WHAT DO WE DO?</h3>
    <p id="whatdo-text"></p>
  </div>

  <div class="card">
    <h3 id="outcomes-title">EXPECTED OUTCOMES</h3>
    <p id="outcomes-text"></p>
  </div>

  <div class="card">
    <h3 id="about-title">ABOUT US</h3>
    <p id="about-text"></p>
  </div>
</section>

<section id="team" class="section">
  <h2 id="team-heading"></h2>
  <div class="item-card">
    <h4 id="team-members">MEMBERS</h4>
    <p id="team-members-text"></p>
  </div>
</section>

</main>

<footer>
  <p id="footer-text"></p>
</footer>

<script>
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

const T = {
  en: {
    subtitle: "Audiovisual Content Production on LGBTIQ+...",
    navHome: "HOME",
    navTeam: "TEAM",
    homeHeading: "HOME",
    teamHeading: "TEAM",
    teamMembers: "MEMBERS",
    teamMembersText: "[Add all team members]",
    footer: "© PRODUCE"
  }
};

function setLang(lang) {
  const t = T[lang];
  if (!t) return;

  document.getElementById('subtitle-text').textContent = t.subtitle;
  document.getElementById('nav-home').textContent = t.navHome;
  document.getElementById('nav-team').textContent = t.navTeam;
  document.getElementById('home-heading').textContent = t.homeHeading;
  document.getElementById('team-heading').textContent = t.teamHeading;
  document.getElementById('team-members').textContent = t.teamMembers;
  document.getElementById('team-members-text').textContent = t.teamMembersText;
  document.getElementById('footer-text').textContent = t.footer;
}

setLang('en');
</script>

</body>
</html>
